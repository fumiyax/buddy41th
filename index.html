<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バディSC 41th 審判管理</title>
<link rel="icon" type="image/png" href="buddylogo.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&family=Cormorant+Garamond:wght@600;700&display=swap');

  :root {
    --black: #05080f;
    --black2: #0a1020;
    --black3: #111827;
    --blue: #1d6fe8;
    --blue-light: #60a5fa;
    --blue-dark: #1241a0;
    --white: #e8f1ff;
    --grey: #7a90b8;
    --grey-light: #b0c4de;
    --border: #1e2e50;
    --card: #0d1a32;
    --card2: #111e38;
    --danger: #c0392b;
    --ok: #2ecc71;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--black2);
    border-bottom: 1px solid var(--blue-dark);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 50%;
  }
  .logo-emblem {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue) 0%, #0a2a6e 100%);
    border: 2px solid var(--blue-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.5px;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--white);
  }
  .logo-sub {
    font-size: 9px;
    color: var(--blue-light);
    letter-spacing: 2px;
    margin-top: 3px;
    font-weight: 500;
  }
  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, #e6b800, #c9a84c);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 2px;
    margin-top: 3px;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-admin {
    background: transparent;
    border: 1px solid var(--blue-dark);
    color: var(--blue-light);
    padding: 6px 14px;
    border-radius: 2px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-admin:hover { background: var(--blue-dark); color: var(--white); }

  /* NAV TABS */
  nav {
    background: var(--black3);
    border-top: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 11px 22px;
    color: var(--grey);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .tab.active {
    color: var(--blue-light);
    border-bottom-color: var(--blue-light);
  }
  .tab:hover:not(.active) {
    color: var(--white);
    background: rgba(255,255,255,0.03);
  }

  /* MAIN */
  main { padding: 16px; max-width: 800px; margin: 0 auto; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-weight: 700;
    font-size: 13px;
    color: var(--blue-light);
    margin-bottom: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  @media (max-width: 480px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--blue-light);
    line-height: 1;
  }
  .stat-num.gold { color: #e2c47a; }
  .stat-num.green { color: #2ecc71; }
  .stat-num.red { color: #e74c3c; }
  .stat-label { font-size: 10px; color: var(--grey); margin-top: 3px; letter-spacing: 1px; }

  /* MATCH LIST */
  .event-item {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    margin-bottom: 8px;
    background: var(--card);
    transition: all 0.2s;
    position: relative;
  }
  .event-item:hover { border-color: var(--blue-dark); }
  .event-item.expanded { border-color: var(--blue); border-left: 3px solid var(--blue); }
  .event-header { display: flex; align-items: center; gap: 12px; }
  .event-date {
    background: var(--black3);
    border: 1px solid var(--blue-dark);
    color: var(--blue-light);
    border-radius: 3px;
    padding: 6px 10px;
    text-align: center;
    min-width: 52px;
    flex-shrink: 0;
  }
  .event-date .month { font-size: 9px; opacity: 0.8; letter-spacing: 1px; }
  .event-date .day { font-size: 24px; font-weight: 900; line-height: 1; font-family: 'Bebas Neue', sans-serif; }
  .event-date .weekday { font-size: 9px; opacity: 0.8; }
  .event-info { flex: 1; min-width: 0; }
  .event-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--white); }
  .event-meta { font-size: 11px; color: var(--grey); margin-top: 3px; }
  .event-type-badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .badge-league    { background: rgba(29,111,232,0.15); color: var(--blue-light); border: 1px solid var(--blue-dark); }
  .badge-cup       { background: rgba(201,168,76,0.15); color: #e2c47a;           border: 1px solid rgba(201,168,76,0.4); }
  .badge-friendly  { background: rgba(46,204,113,0.10); color: #2ecc71;           border: 1px solid rgba(46,204,113,0.3); }
  .badge-training  { background: rgba(255,255,255,0.05); color: var(--grey);      border: 1px solid var(--border); }

  /* EVENT DETAIL */
  .event-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .event-item.expanded .event-detail { display: block; }
  .event-detail-row { display: flex; font-size: 13px; margin-bottom: 7px; gap: 10px; }
  .event-detail-label { color: var(--grey); min-width: 60px; flex-shrink: 0; font-size: 11px; letter-spacing: 1px; }
  .event-detail-value { color: var(--white); flex: 1; word-break: break-all; }
  .event-detail-value a { color: var(--blue-light); text-decoration: none; }
  .event-detail-value a:hover { color: var(--white); }

  /* ASSIGN SECTION */
  .assign-section { margin-top: 14px; }
  .assign-title { font-size: 10px; font-weight: 700; color: var(--blue-light); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
  .assign-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .assign-row:last-child { border-bottom: none; }
  .assign-role {
    min-width: 64px;
    font-size: 10px;
    font-weight: 700;
    color: var(--grey);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .assign-name { flex: 1; font-weight: 700; color: var(--white); }
  .assign-name.empty { color: var(--grey); font-style: italic; font-weight: 400; }
  .assign-chip {
    background: rgba(29,111,232,0.15);
    border: 1px solid var(--blue-dark);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--blue-light);
  }

  /* ATTENDANCE TABLE */
  .att-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .att-table th {
    text-align: center;
    padding: 8px;
    font-size: 10px;
    color: var(--blue-light);
    border-bottom: 1px solid var(--blue-dark);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .att-table th.name-col { text-align: left; }
  .att-table td {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  .att-table td.name-col { text-align: left; font-weight: 600; font-size: 13px; color: var(--white); }
  .att-table tr.row-ok { background: rgba(46,204,113,0.05); }
  .att-table tr.row-ng { background: rgba(192,57,43,0.05); }
  .att-table tr:last-child td { border-bottom: none; }
  .att-btn {
    width: 34px; height: 28px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--black3);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--grey);
  }
  .att-btn.selected-ok      { border-color: #2ecc71; background: rgba(46,204,113,0.15); color: #2ecc71; box-shadow: 0 0 0 1px #2ecc7160; }
  .att-btn.selected-ng      { border-color: #e74c3c; background: rgba(231,76,60,0.15);  color: #e74c3c; box-shadow: 0 0 0 1px #e74c3c60; }
  .att-btn.selected-pending { border-color: var(--grey); background: rgba(136,136,136,0.1); }
  .att-btn:hover { transform: scale(1.1); border-color: var(--blue); }
  .att-count-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .att-count {
    font-size: 11px; padding: 4px 12px;
    border-radius: 2px; border: 1px solid var(--border);
    color: var(--grey-light); background: var(--black3);
  }
  .att-count.ok  { border-color: rgba(46,204,113,0.4); color: #2ecc71; background: rgba(46,204,113,0.08); }
  .att-count.ng  { border-color: rgba(192,57,43,0.4);  color: #e74c3c; background: rgba(192,57,43,0.08); }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 10px; font-weight: 700; color: var(--blue-light); margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
  input, select, textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    color: var(--white); background: var(--black3);
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
  input::placeholder, textarea::placeholder { color: #3a4a6a; }
  select option { background: var(--black3); }
  textarea { resize: vertical; min-height: 70px; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--black3); font-size: 14px; color: var(--white);
  }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    top: 3px; left: 3px; transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--blue); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .btn {
    padding: 10px 20px; border-radius: 3px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; letter-spacing: 1px;
  }
  .btn-primary { background: var(--blue); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--blue-light); color: var(--black); }
  .btn-danger { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { background: rgba(192,57,43,0.25); }
  .btn-sm { font-size: 11px; padding: 6px 12px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--grey-light); }
  .btn-ghost:hover { border-color: var(--blue-dark); color: var(--blue-light); }

  /* REFEREE LIST */
  .member-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 3px; margin-bottom: 6px; background: var(--card);
  }
  .member-name { font-weight: 700; font-size: 14px; color: var(--white); }
  .member-meta { font-size: 12px; color: var(--grey); margin-top: 3px; }
  .member-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
  .tag {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 2px; font-weight: 700;
  }
  .tag-license  { background: rgba(29,111,232,0.15); color: var(--blue-light); border: 1px solid var(--blue-dark); }
  .tag-active   { background: rgba(46,204,113,0.12); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
  .tag-inactive { background: rgba(192,57,43,0.12); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .tag-billing  { background: rgba(201,168,76,0.12); color: #e2c47a; border: 1px solid rgba(201,168,76,0.3); }

  /* OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(3px);
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--blue-dark);
    border-radius: 4px; width: 100%; max-width: 480px;
    max-height: 88vh; overflow-y: auto; padding: 22px;
  }
  .modal-title {
    font-size: 16px; font-weight: 700; margin-bottom: 18px;
    color: var(--blue-light); letter-spacing: 2px; text-transform: uppercase;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; }

  /* MONTH FILTER */
  #monthFilter { scrollbar-width: none; }
  #monthFilter::-webkit-scrollbar { display: none; }
  .month-btn {
    flex: 0 0 auto; padding: 5px 14px; border-radius: 2px;
    border: 1px solid var(--border); background: var(--black3);
    color: var(--grey); font-size: 12px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px;
    transition: all 0.15s; white-space: nowrap;
  }
  .month-btn:hover { border-color: var(--blue-dark); color: var(--blue-light); }
  .month-btn.active { border-color: var(--blue); background: rgba(29,111,232,0.12); color: var(--blue-light); font-weight: 700; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--blue); color: #fff;
    padding: 10px 22px; border-radius: 2px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    z-index: 999; transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--grey); }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.8; }

  /* LOADING */
  .loading { text-align: center; padding: 30px; color: var(--grey); font-size: 13px; }
  .spinner {
    width: 26px; height: 26px; border: 2px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .row { display: flex; gap: 8px; }
  .row .form-group { flex: 1; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-row input, .filter-row select { padding: 7px 10px; font-size: 12px; }

  @media (max-width: 480px) {
    .logo-text { font-size: 14px; }
    .logo-emblem { width: 52px; height: 52px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <img class="logo-img" src="buddylogo.png" alt="バディSC" onerror="this.style.display='none'" />
      <div>
        <div class="logo-text">バディ世田谷</div>
        <div class="logo-sub">REFEREE MANAGEMENT</div>
        <div class="logo-badge">41TH</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-admin" onclick="openAdminModal()">SETTINGS</button>
    </div>
  </div>
  <nav>
    <div class="tab active" onclick="showTab('schedule')" id="tab-schedule">試合管理</div>
    <div class="tab" onclick="showTab('members')" id="tab-members">審判一覧</div>
    <div class="tab" onclick="showTab('settings')" id="tab-settings">CONFIG</div>
  </nav>
</header>

<main>

  <!-- ======================== 試合管理 TAB ======================== -->
  <section class="section active" id="section-schedule">

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box"><div class="stat-num" id="statTotal">—</div><div class="stat-label">審判数</div></div>
      <div class="stat-box"><div class="stat-num green" id="statActive">—</div><div class="stat-label">参加可能</div></div>
      <div class="stat-box"><div class="stat-num red" id="statBilling">—</div><div class="stat-label">更新料請求</div></div>
      <div class="stat-box"><div class="stat-num gold" id="statMatches">—</div><div class="stat-label">今月試合数</div></div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div style="font-size:13px; color:var(--grey);">UPCOMING MATCHES</div>
      <div style="display:flex; gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="loadData()">更新</button>
        <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ 試合追加</button>
      </div>
    </div>

    <div id="monthFilter" style="display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-bottom:12px; padding-bottom:2px;"></div>

    <div id="eventList">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>

  </section>

  <!-- ======================== 審判一覧 TAB ======================== -->
  <section class="section" id="section-members">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div style="font-size:13px; color:var(--grey);">登録審判</div>
      <button class="btn btn-primary btn-sm" onclick="openMemberModal()">+ 審判登録</button>
    </div>
    <div class="filter-row">
      <input type="text" id="searchInput" placeholder="名前で検索..." oninput="renderMembers()" style="flex:1; min-width:120px;">
      <select id="filterLicense" onchange="renderMembers()" style="width:auto; min-width:100px;">
        <option value="">全ライセンス</option>
        <option value="1級">1級</option>
        <option value="2級">2級</option>
        <option value="3級">3級</option>
        <option value="4級">4級</option>
        <option value="女子1級">女子1級</option>
        <option value="女子2級">女子2級</option>
        <option value="なし">なし</option>
      </select>

    </div>
    <div id="memberList">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </section>

  <!-- ======================== CONFIG TAB ======================== -->
  <section class="section" id="section-settings">
    <div class="card">
      <div class="card-title">データ操作</div>
      <p style="font-size:13px; color:var(--grey); margin-bottom:12px;">スプレッドシートとの同期を手動で行います</p>
      <button class="btn btn-primary" onclick="loadData()">🔄 全データ再読み込み</button>
    </div>
    <div class="card" style="margin-top:12px;">
      <div class="card-title">GASコード</div>
      <p style="font-size:13px; color:var(--grey); margin-bottom:12px;">開発者向け：Apps Scriptのソースコードを確認できます</p>
      <button class="btn btn-ghost btn-sm" onclick="showGasCode()">📋 GASコードを表示</button>
    </div>
  </section>

</main>

<!-- ==================== MODALS ==================== -->

<!-- MATCH MODAL -->
<div class="overlay" id="eventOverlay">
  <div class="modal">
    <div class="modal-title" id="eventModalTitle">試合追加</div>
    <input type="hidden" id="eventId" />
    <div class="row">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="eventDate" />
      </div>
      <div class="form-group">
        <label>種別</label>
        <select id="eventType">
          <option value="league">リーグ戦</option>
          <option value="cup">カップ戦</option>
          <option value="friendly">練習試合</option>
          <option value="training">講習</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>試合名</label>
      <input type="text" id="eventTitle" placeholder="例: 第5節 vs ○○FC" />
    </div>
    <div class="row">
      <div class="form-group">
        <label>会場</label>
        <input type="text" id="eventLocation" placeholder="例: バディフィールド" />
      </div>
      <div class="form-group">
        <label>時間</label>
        <input type="text" id="eventTime" placeholder="例: 10:00〜12:00" />
      </div>
    </div>
    <div class="form-group">
      <label>カテゴリ</label>
      <input type="text" id="eventCategory" placeholder="例: U12, 一般" />
    </div>
    <div class="form-group">
      <label>資料リンク</label>
      <input type="url" id="eventFileUrl" placeholder="Google DriveのURL" />
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="eventNote" placeholder="注意事項など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEventModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEvent()">保存</button>
    </div>
    <div style="text-align:right; margin-top:8px;" id="deleteEventBtn" style="display:none">
      <button class="btn btn-danger" onclick="deleteEvent()">削除</button>
    </div>
  </div>
</div>

<!-- REFEREE MODAL -->
<div class="overlay" id="memberOverlay">
  <div class="modal">
    <div class="modal-title" id="memberModalTitle">審判登録</div>
    <input type="hidden" id="memberId" />
    <div class="form-group">
      <label>氏名</label>
      <input type="text" id="memberName" placeholder="例: 山田 太郎" />
    </div>
    <div class="form-group">
      <label>保有ライセンス級</label>
      <select id="memberLicense">
        <option value="">選択してください</option>
        <option value="1級">1級</option>
        <option value="2級">2級</option>
        <option value="3級">3級</option>
        <option value="4級">4級</option>
        <option value="女子1級">女子1級</option>
        <option value="女子2級">女子2級</option>
        <option value="なし">なし</option>
      </select>
    </div>
    <div class="form-group">
      <label>更新料請求要否</label>
      <div class="toggle-row">
        <span>更新料の請求が必要</span>
        <label class="toggle">
          <input type="checkbox" id="memberBilling">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>備考</label>
      <textarea id="memberNote" placeholder="自由記入欄"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeMemberModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveMember()">保存</button>
    </div>
    <div style="text-align:right; margin-top:8px;" id="deleteMemberBtn" style="display:none">
      <button class="btn btn-danger" onclick="deleteMember()">削除</button>
    </div>
  </div>
</div>

<!-- GAS CODE MODAL -->
<div class="overlay" id="gasCodeOverlay">
  <div class="modal">
    <div class="modal-title">GAS CODE</div>
    <p style="font-size:12px; color:var(--grey); margin-bottom:10px;">以下をGoogle Apps Scriptに貼り付けてください</p>
    <textarea id="gasCodeText" style="font-family:monospace; font-size:11px; height:300px; white-space:pre;" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGasCodeModal()">閉じる</button>
      <button class="btn btn-primary" onclick="copyGasCode()">コピー</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="overlay" id="adminOverlay">
  <div class="modal">
    <div class="modal-title">SETTINGS</div>
    <p style="font-size:13px; color:var(--grey); margin-bottom:16px;">管理者設定に移動します</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAdminModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="enterAdmin()">設定を開く</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =====================================================
// GAS CODE TEMPLATE
// =====================================================
const GAS_CODE = `// ==========================================
// バディ世田谷 41th 審判管理システム
// Google Apps Script バックエンド
// ==========================================

const SS = SpreadsheetApp.getActiveSpreadsheet();

function doGet(e)  { return handleRequest(e); }
function doPost(e) { return handleRequest(e); }

function handleRequest(e) {
  const body = e.postData ? JSON.parse(e.postData.contents || '{}') : e.parameter || {};
  let result;
  try {
    switch (body.action) {
      case 'getAll':          result = getAll();                 break;
      case 'saveEvent':       result = saveEvent(body);          break;
      case 'deleteEvent':     result = deleteRow('matches', body.id); break;
      case 'saveMember':      result = saveMember(body);         break;
      case 'deleteMember':    result = deleteRow('referees', body.id); break;
      case 'setAttendance':   result = setAttendance(body);      break;
      default:                result = { error: 'unknown action' };
    }
  } catch (err) {
    result = { error: err.message };
  }
  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function getAll() {
  return {
    events:     sheetToArray('matches'),
    members:    sheetToArray('referees'),
    attendance: sheetToArray('attendance'),
  };
}

function sheetToArray(name) {
  const sh = getOrCreateSheet(name);
  const data = sh.getDataRange().getValues();
  if (data.length < 2) return [];
  const headers = data[0];
  return data.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => {
      let v = row[i];
      if (v === 'TRUE' || v === true)  v = true;
      if (v === 'FALSE' || v === false) v = false;
      obj[h] = v;
    });
    return obj;
  });
}

function getOrCreateSheet(name) {
  let sh = SS.getSheetByName(name);
  if (!sh) {
    sh = SS.insertSheet(name);
    const headers = {
      matches:    ['id','date','type','title','location','time','category','fileUrl','note'],
      referees:   ['id','name','license','billing','note'],
      attendance: ['eventId','memberId','status','comment'],
    };
    const headerRow = headers[name] || ['id'];
    sh.appendRow(headerRow);
    sh.getRange(1,1,1,headerRow.length).setBackground('#1241a0').setFontColor('#ffffff').setFontWeight('bold');
  }
  return sh;
}

function saveEvent(data) {
  const sh = getOrCreateSheet('matches');
  const rows = sh.getDataRange().getValues();
  const id = data.id || new Date().getTime().toString();
  const row = [id, data.date, data.type, data.title, data.location, data.time, data.category, data.fileUrl||'', data.note||''];
  const existing = rows.slice(1).findIndex(r => r[0] == id);
  if (existing >= 0) sh.getRange(existing+2,1,1,row.length).setValues([row]);
  else sh.appendRow(row);
  return { ok: true, id };
}

function saveMember(data) {
  const sh = getOrCreateSheet('referees');
  const rows = sh.getDataRange().getValues();
  const id = data.id || new Date().getTime().toString();
  const row = [id, data.name, data.license||'', data.billing, data.note||''];
  const existing = rows.slice(1).findIndex(r => r[0] == id);
  if (existing >= 0) sh.getRange(existing+2,1,1,row.length).setValues([row]);
  else sh.appendRow(row);
  return { ok: true, id };
}

function setAttendance(data) {
  const sh = getOrCreateSheet('attendance');
  const rows = sh.getDataRange().getValues();
  const existing = rows.slice(1).findIndex(r => r[0] == data.eventId && r[1] == data.memberId);
  if (existing >= 0) {
    sh.getRange(existing+2,3).setValue(data.status);
    sh.getRange(existing+2,4).setValue(data.comment||'');
  } else {
    sh.appendRow([data.eventId, data.memberId, data.status, data.comment||'']);
  }
  return { ok: true };
}

function deleteRow(sheetName, id) {
  const sh = getOrCreateSheet(sheetName);
  const rows = sh.getDataRange().getValues();
  const idx = rows.slice(1).findIndex(r => r[0] == id);
  if (idx >= 0) sh.deleteRow(idx+2);
  return { ok: true };
}
`;

// =====================================================
// STATE
// =====================================================
let state = {
  gasUrl: '',
  events: [],
  members: [],
  attendance: [],
  editingEventId: null,
  editingMemberId: null,
  selectedMonth: null,
};

// =====================================================
// INIT
// =====================================================
const HARDCODED_GAS_URL = 'https://script.google.com/macros/s/AKfycbzL-SQgXO1R58lwnglbr9dp0f7xzmlzCN2gozSgn4aK1rwkrrOD3OvC6e7vPzN2FTUTcg/exec';

function init() {
  const cfg = JSON.parse(localStorage.getItem('buddy41_cfg') || '{}');
  state.gasUrl = HARDCODED_GAS_URL;
  // GAS URLはハードコード済み
  if (cfg.logoUrl) applyLogoUrl(cfg.logoUrl);
  document.getElementById('gasCodeText').value = GAS_CODE;
  if (state.gasUrl) loadData();
  else renderStats();
}

// =====================================================
// API
// =====================================================
async function gasRequest(body) {
  if (!state.gasUrl) { showToast('設定タブでGAS URLを登録してください'); return null; }
  try {
    const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify(body) });
    return await res.json();
  } catch(e) {
    try {
      const res = await fetch(state.gasUrl + '?action=' + body.action);
      return await res.json();
    } catch(e2) {
      showToast('通信エラー: ' + e2.message);
      return null;
    }
  }
}

async function loadData() {
  showToast('読み込み中...');
  const data = await gasRequest({ action: 'getAll' });
  if (!data) return;
  state.events    = data.events    || [];
  state.members   = data.members   || [];
  state.attendance = data.attendance || [];
  renderMonthFilter();
  renderEvents();
  renderMembers();
  renderStats();
  showToast('更新しました');
}

// =====================================================
// TABS
// =====================================================
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'schedule') fillRefereeSelects();
}

// =====================================================
// STATS
// =====================================================
function renderStats() {
  document.getElementById('statTotal').textContent   = state.members.length;
  document.getElementById('statActive').textContent  = state.members.filter(m => m.active).length;
  document.getElementById('statBilling').textContent = state.members.filter(m => m.billing).length;
  const ym = new Date().toISOString().slice(0, 7);
  document.getElementById('statMatches').textContent = state.events.filter(e => (e.date || '').startsWith(ym)).length;
}

// =====================================================
// EVENTS
// =====================================================
const TYPE_LABELS   = { league:'リーグ戦', cup:'カップ戦', friendly:'練習試合', training:'講習' };
const TYPE_CLASSES  = { league:'badge-league', cup:'badge-cup', friendly:'badge-friendly', training:'badge-training' };
const WEEKDAYS = ['日','月','火','水','木','金','土'];

function renderMonthFilter() {
  const today = new Date(); today.setHours(0,0,0,0);
  const months = [...new Set(
    state.events.filter(ev => new Date(ev.date) >= today).map(ev => ev.date.slice(0,7))
  )].sort();
  const container = document.getElementById('monthFilter');
  if (months.length <= 1) { container.innerHTML = ''; return; }
  const currentYear = today.getFullYear();
  container.innerHTML = [
    `<button class="month-btn ${state.selectedMonth === null ? 'active' : ''}" onclick="setMonthFilter(null)">すべて</button>`,
    ...months.map(m => {
      const [y, mo] = m.split('-');
      const label = parseInt(y) !== currentYear ? `${y}/${parseInt(mo)}月` : `${parseInt(mo)}月`;
      return `<button class="month-btn ${state.selectedMonth === m ? 'active' : ''}" onclick="setMonthFilter('${m}')">${label}</button>`;
    })
  ].join('');
}

function setMonthFilter(month) {
  state.selectedMonth = month;
  renderMonthFilter();
  renderEvents();
}

function renderEvents() {
  const container = document.getElementById('eventList');
  const today = new Date(); today.setHours(0,0,0,0);
  const sorted = [...state.events]
    .filter(ev => {
      if (!ev.date || new Date(ev.date) < today) return false;
      if (state.selectedMonth && !ev.date.startsWith(state.selectedMonth)) return false;
      return true;
    })
    .sort((a, b) => a.date < b.date ? -1 : 1);

  if (!sorted.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">—</div><p>試合がまだありません<br>「＋ 試合追加」で登録しましょう</p></div>`;
    return;
  }

  container.innerHTML = sorted.map(ev => {
    const d = new Date(ev.date);
    const month = (d.getMonth() + 1) + '月';
    const day   = d.getDate();
    const wd    = WEEKDAYS[d.getDay()];
    const wdStyle = d.getDay() === 0 ? 'color:#e74c3c' : d.getDay() === 6 ? 'color:#60a5fa' : '';
    const att = getAttSummary(ev.id);
    const id  = ev.id;

    return `
    <div class="event-item" id="evitem-${id}">
      <div class="event-header" onclick="toggleEvent('${id}')" style="cursor:pointer;display:flex;align-items:center;gap:12px;">
        <div class="event-date">
          <div class="month">${month}</div>
          <div class="day" style="${wdStyle}">${day}</div>
          <div class="weekday" style="${wdStyle}">(${wd})</div>
        </div>
        <div class="event-info" style="flex:1;min-width:0;">
          <div class="event-title">${ev.title || '（タイトルなし）'}</div>
          <div class="event-meta">${ev.location || '会場未定'}${ev.time ? ' / ' + ev.time : ''}${ev.category ? ' / ' + ev.category : ''}</div>
          <div style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="event-type-badge ${TYPE_CLASSES[ev.type] || 'badge-training'}">${TYPE_LABELS[ev.type] || ev.type}</span>

          </div>
        </div>
        <div style="color:var(--grey);font-size:20px;padding-right:4px;transition:transform 0.2s;" class="chevron-${id}">›</div>
      </div>
      <div class="event-detail">
        ${ev.location   ? `<div class="event-detail-row"><span class="event-detail-label">会場</span><span class="event-detail-value">${ev.location}</span></div>` : ''}
        ${ev.time       ? `<div class="event-detail-row"><span class="event-detail-label">時間</span><span class="event-detail-value">${ev.time}</span></div>` : ''}
        ${ev.category   ? `<div class="event-detail-row"><span class="event-detail-label">カテゴリ</span><span class="event-detail-value">${ev.category}</span></div>` : ''}
        ${ev.fileUrl    ? `<div class="event-detail-row"><span class="event-detail-label">資料</span><span class="event-detail-value"><a href="${ev.fileUrl}" target="_blank" rel="noopener">Google Drive で開く</a></span></div>` : ''}
        ${ev.note       ? `<div class="event-detail-row"><span class="event-detail-label">メモ</span><span class="event-detail-value">${ev.note}</span></div>` : ''}

        <div class="assign-section" style="margin-top:14px;">
          <div class="assign-title">稼働記録</div>
          <div class="att-count-row">
            <div class="att-count ok">稼働 ${att.ok}人</div>
            <div class="att-count ng">欠席 ${att.ng}人</div>
            <div class="att-count">未回答 ${att.pending}人</div>
          </div>
          <div id="attgrid-${id}">
            ${renderAttGrid(id)}
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
          <button class="btn btn-ghost btn-sm" onclick="toggleEvent('${id}')">閉じる</button>
          <button class="btn btn-ghost btn-sm" onclick="openEventModal('${id}')">編集</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleEvent(id) {
  const el = document.getElementById('evitem-' + id);
  el.classList.toggle('expanded');
  const chevron = el.querySelector('.chevron-' + id);
  if (chevron) chevron.style.transform = el.classList.contains('expanded') ? 'rotate(90deg)' : '';
}

function refName(id) {
  if (!id) return '';
  const m = state.members.find(m => m.id == id);
  return m ? m.name : '';
}

function refLicense(id) {
  if (!id) return '';
  const m = state.members.find(m => m.id == id);
  return m && m.license ? m.license : '—';
}

function getAttSummary(eventId) {
  const total   = state.members.length;
  const evAtt   = state.attendance.filter(a => a.eventId == eventId);
  const ok      = evAtt.filter(a => a.status === 'ok').length;
  const ng      = evAtt.filter(a => a.status === 'ng').length;
  const pending = total - ok - ng;
  return { ok, ng, pending };
}

function renderAttGrid(eventId) {
  const activeMembers = state.members.filter(m => m.active);
  if (!activeMembers.length) return '<div style="font-size:12px;color:var(--grey);">参加可能な審判が登録されていません</div>';
  const rows = activeMembers.map(m => {
    const att    = state.attendance.find(a => a.eventId == eventId && a.memberId == m.id);
    const status  = att ? att.status : 'pending';
    const comment = att ? (att.comment || '') : '';
    const rowClass = status === 'ok' ? 'row-ok' : status === 'ng' ? 'row-ng' : '';
    return `<tr class="${rowClass}">
      <td class="name-col">${m.name}</td>
      <td><button class="att-btn ${status === 'ok' ? 'selected-ok' : ''}" onclick="setAttUI('${eventId}','${m.id}','ok')">○</button></td>
      <td><button class="att-btn ${status === 'ng' ? 'selected-ng' : ''}" onclick="setAttUI('${eventId}','${m.id}','ng')">×</button></td>
      <td><button class="att-btn ${status === 'pending' ? 'selected-pending' : ''}" onclick="setAttUI('${eventId}','${m.id}','pending')">?</button></td>
      <td><input type="text" class="comment-input" placeholder="コメント..." value="${comment.replace(/"/g,'&quot;')}"
        style="font-size:12px;padding:5px 8px;"
        onchange="saveComment('${eventId}','${m.id}',this.value)"
        onclick="event.stopPropagation()" /></td>
    </tr>`;
  }).join('');
  return `<table class="att-table">
    <thead><tr>
      <th class="name-col">審判名</th>
      <th>稼働</th><th>欠席</th><th>未定</th>
      <th style="text-align:left; min-width:100px;">コメント</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function setAttUI(eventId, memberId, status) {
  const att = state.attendance.find(a => a.eventId == eventId && a.memberId == memberId);
  if (att) att.status = status;
  else state.attendance.push({ eventId, memberId, status, comment: '' });
  const grid = document.getElementById('attgrid-' + eventId);
  if (grid) grid.innerHTML = renderAttGrid(eventId);
  const sum = getAttSummary(eventId);
  const item = document.getElementById('evitem-' + eventId);
  if (item) {
    const counts = item.querySelectorAll('.att-count');
    if (counts[0]) counts[0].textContent = '稼働 ' + sum.ok + '人';
    if (counts[1]) counts[1].textContent = '欠席 ' + sum.ng + '人';
    if (counts[2]) counts[2].textContent = '未回答 ' + sum.pending + '人';
  }
  gasRequest({ action: 'setAttendance', eventId, memberId, status });
}

async function saveComment(eventId, memberId, comment) {
  const att = state.attendance.find(a => a.eventId == eventId && a.memberId == memberId);
  if (att) att.comment = comment;
  else state.attendance.push({ eventId, memberId, status: 'pending', comment });
  gasRequest({ action: 'setAttendance', eventId, memberId, status: att ? att.status : 'pending', comment });
}

// =====================================================
// EVENT MODAL
// =====================================================
function fillRefereeSelects() { /* アサイン機能削除済み */ }

function openEventModal(id) {
  state.editingEventId = id || null;
  fillRefereeSelects();
  const ev = id ? state.events.find(e => e.id == id) : null;
  document.getElementById('eventModalTitle').textContent = ev ? '試合編集' : '試合追加';
  document.getElementById('eventId').value       = ev ? ev.id         : '';
  document.getElementById('eventDate').value     = ev ? ev.date       : '';
  document.getElementById('eventType').value     = ev ? ev.type       : 'league';
  document.getElementById('eventTitle').value    = ev ? ev.title      : '';
  document.getElementById('eventLocation').value = ev ? ev.location   : '';
  document.getElementById('eventTime').value     = ev ? ev.time       : '';
  document.getElementById('eventCategory').value = ev ? ev.category   : '';
  document.getElementById('eventRef1').value     = ev ? (ev.ref1||'') : '';
  document.getElementById('eventRef2').value     = ev ? (ev.ref2||'') : '';
  document.getElementById('eventRef3').value     = ev ? (ev.ref3||'') : '';
  document.getElementById('eventFileUrl').value  = ev ? ev.fileUrl    : '';
  document.getElementById('eventNote').value     = ev ? ev.note       : '';
  document.getElementById('deleteEventBtn').style.display = ev ? 'block' : 'none';
  document.getElementById('eventOverlay').classList.add('show');
}

function closeEventModal() { document.getElementById('eventOverlay').classList.remove('show'); }

async function saveEvent() {
  const data = {
    action:   'saveEvent',
    id:       document.getElementById('eventId').value || new Date().getTime().toString(),
    date:     document.getElementById('eventDate').value,
    type:     document.getElementById('eventType').value,
    title:    document.getElementById('eventTitle').value,
    location: document.getElementById('eventLocation').value,
    time:     document.getElementById('eventTime').value,
    category: document.getElementById('eventCategory').value,
    fileUrl:  document.getElementById('eventFileUrl').value,
    note:     document.getElementById('eventNote').value,
  };
  if (!data.date || !data.title) { showToast('日付とタイトルを入力してください'); return; }
  const existing = state.events.findIndex(e => e.id == data.id);
  if (existing >= 0) state.events[existing] = data;
  else state.events.push(data);
  renderMonthFilter();
  renderEvents();
  renderStats();
  closeEventModal();
  showToast('保存しました');
  await gasRequest(data);
}

async function deleteEvent() {
  if (!confirm('この試合を削除しますか？')) return;
  const id = document.getElementById('eventId').value;
  state.events     = state.events.filter(e => e.id != id);
  state.attendance = state.attendance.filter(a => a.eventId != id);
  renderEvents();
  renderStats();
  closeEventModal();
  showToast('削除しました');
  await gasRequest({ action: 'deleteEvent', id });
}

// =====================================================
// MEMBERS (REFEREES)
// =====================================================
function renderMembers() {
  const container = document.getElementById('memberList');
  const search     = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filterLic  = document.getElementById('filterLicense')?.value || '';


  let list = state.members.filter(m => {
    if (search && !(m.name || '').toLowerCase().includes(search)) return false;
    if (filterLic && m.license !== filterLic) return false;

    return true;
  });

  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">—</div><p>該当する審判が見つかりません<br>「＋ 審判登録」で追加しましょう</p></div>`;
    return;
  }

  container.innerHTML = list.map(m => `
    <div class="member-item">
      <div style="flex:1; min-width:0;">
        <div class="member-name">${m.name}${m.kana ? `<span style="font-size:11px;color:var(--grey);font-weight:400;margin-left:8px;">${m.kana}</span>` : ''}</div>

        <div class="member-tags">
          ${m.license ? `<span class="tag tag-license">🏅 ${m.license}</span>` : ''}
          ${m.billing ? `<span class="tag tag-billing">💰 更新料請求</span>` : ''}
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="openMemberModal('${m.id}')">✏</button>
    </div>
  `).join('');
}

function openMemberModal(id) {
  const m = id ? state.members.find(m => m.id == id) : null;
  document.getElementById('memberModalTitle').textContent = m ? '審判編集' : '審判登録';
  document.getElementById('memberId').value        = m ? m.id       : '';
  document.getElementById('memberName').value      = m ? m.name     : '';
  document.getElementById('memberLicense').value   = m ? m.license  : '';
  document.getElementById('memberBilling').checked = m ? !!m.billing : false;
  document.getElementById('memberNote').value      = m ? m.note     : '';
  document.getElementById('deleteMemberBtn').style.display = m ? 'block' : 'none';
  document.getElementById('memberOverlay').classList.add('show');
}

function closeMemberModal() { document.getElementById('memberOverlay').classList.remove('show'); }

async function saveMember() {
  const data = {
    action:   'saveMember',
    id:       document.getElementById('memberId').value || new Date().getTime().toString(),
    name:     document.getElementById('memberName').value,
    license:  document.getElementById('memberLicense').value,
    billing:  document.getElementById('memberBilling').checked,
    note:     document.getElementById('memberNote').value,
  };
  if (!data.name) { showToast('氏名を入力してください'); return; }
  const existing = state.members.findIndex(m => m.id == data.id);
  if (existing >= 0) state.members[existing] = data;
  else state.members.push(data);
  renderMembers();
  renderStats();
  closeMemberModal();
  showToast('保存しました');
  await gasRequest(data);
}

async function deleteMember() {
  if (!confirm('この審判を削除しますか？')) return;
  const id = document.getElementById('memberId').value;
  state.members = state.members.filter(m => m.id != id);
  renderMembers();
  renderStats();
  closeMemberModal();
  showToast('削除しました');
  await gasRequest({ action: 'deleteMember', id });
}

// =====================================================
// SETTINGS
// =====================================================
function saveSettings() {
  showToast('設定を保存しました');
}

function applyLogoUrl(url) {
  const el = document.getElementById('logoEmblem');
  if (!el) return;
  el.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent='BSC'">`;
}

// =====================================================
// ADMIN
// =====================================================
function openAdminModal()  { document.getElementById('adminOverlay').classList.add('show'); }
function closeAdminModal() { document.getElementById('adminOverlay').classList.remove('show'); }
function enterAdmin() { closeAdminModal(); showTab('settings'); }

function showGasCode()      { document.getElementById('gasCodeOverlay').classList.add('show'); }
function closeGasCodeModal(){ document.getElementById('gasCodeOverlay').classList.remove('show'); }
function copyGasCode() {
  navigator.clipboard.writeText(GAS_CODE).then(() => showToast('コピーしました'));
}

// =====================================================
// TOAST
// =====================================================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// =====================================================
// OVERLAY CLOSE
// =====================================================
document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
});

// =====================================================
// START
// =====================================================
init();
</script>
</body>
</html>
