<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バディ世田谷41期</title>
<link rel="icon" type="image/png" href="shared/buddylogo.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',sans-serif; background:#f5f5f5; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .header { width:100%; background:linear-gradient(135deg,#1a237e 0%,#283593 100%); color:#fff; padding:24px 16px; text-align:center; }
  .header img { width:48px; height:48px; border-radius:50%; margin-bottom:8px; }
  .header h1 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; }
  .header p { font-size:13px; opacity:0.8; margin-top:4px; }
  .tools { padding:24px 16px; width:100%; max-width:480px; }
  .tool-card {
    display:flex; align-items:center; gap:16px;
    background:#fff; border-radius:12px; padding:20px;
    margin-bottom:12px; text-decoration:none; color:#333;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .tool-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .tool-icon { font-size:32px; flex-shrink:0; }
  .tool-info h2 { font-size:16px; font-weight:700; }
  .tool-info p { font-size:12px; color:#888; margin-top:4px; }
</style>
</head>
<body>
  <div class="header">
    <img src="shared/buddylogo.png" alt="バディ世田谷" onerror="this.style.display='none'" />
    <h1>BUDDY SETAGAYA 41</h1>
    <p>バディ世田谷41期 ツール</p>
  </div>
  <div class="tools">
    <a class="tool-card" href="referee/">
      <span class="tool-icon">🏁</span>
      <div class="tool-info">
        <h2>審判管理</h2>
        <p>試合・審判出欠・審判一覧の管理</p>
      </div>
    </a>
    <!-- 新しいツールはここに追加 -->
  </div>
</body>
</html>
