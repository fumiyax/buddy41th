<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バディSC 41th｜審判管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #05080f;
      --surface:  #0d1526;
      --card:     #111d33;
      --border:   #1e3058;
      --accent:   #1e90ff;
      --accent2:  #00cfff;
      --gold:     #ffd700;
      --red:      #ff4d6d;
      --green:    #00e676;
      --orange:   #ffab40;
      --text:     #e8f0fe;
      --muted:    #5c7aaa;
      --white:    #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ========== HEADER ========== */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-emblem {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: linear-gradient(135deg, var(--accent) 0%, #0050c8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      /* ロゴ画像がある場合はここをimg要素に置き換える */
    }

    .logo-text {
      line-height: 1.2;
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--white);
    }

    .logo-sub {
      font-size: 10px;
      color: var(--accent2);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-41 {
      background: linear-gradient(135deg, var(--gold), #e6a800);
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .sync-status {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red   { background: var(--red); }

    /* ========== TABS ========== */
    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 13px 18px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .tab-btn .tab-icon { margin-right: 5px; }
    .tab-btn.active { color: var(--accent2); }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent2);
    }

    /* ========== MAIN ========== */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    .section { display: none; }
    .section.active { display: block; }

    /* ========== STATS ========== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }

    .stat-card.gold::before { background: var(--gold); }
    .stat-card.green-bar::before { background: var(--green); }
    .stat-card.red-bar::before { background: var(--red); }
    .stat-card.orange-bar::before { background: var(--orange); }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: var(--accent2);
      line-height: 1;
    }
    .stat-card.gold .stat-num { color: var(--gold); }
    .stat-card.green-bar .stat-num { color: var(--green); }
    .stat-card.red-bar .stat-num { color: var(--red); }
    .stat-card.orange-bar .stat-num { color: var(--orange); }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 700;
    }

    /* ========== SECTION HEADER ========== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* ========== CARDS ========== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* ========== FORM ========== */
    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(30,144,255,0.12);
    }
    select option { background: var(--surface); }
    textarea { resize: vertical; min-height: 72px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
    }

    .toggle-label {
      font-size: 14px;
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* ========== BUTTONS ========== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 7px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover  { background: #3aa0ff; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(255,77,109,0.1); }

    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .btn-full { width: 100%; }

    /* ========== REFEREE LIST ========== */
    .referee-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .referee-card:hover { border-color: var(--accent); }

    .referee-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #003f99);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }

    .referee-info { flex: 1; min-width: 0; }

    .referee-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }

    .referee-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .tag-license {
      background: rgba(30,144,255,0.2);
      color: var(--accent2);
      border: 1px solid rgba(30,144,255,0.3);
    }

    .tag-active   { background: rgba(0,230,118,0.15); color: var(--green);  border: 1px solid rgba(0,230,118,0.3); }
    .tag-inactive { background: rgba(255,77,109,0.12); color: var(--red);    border: 1px solid rgba(255,77,109,0.3); }
    .tag-billing  { background: rgba(255,215,0,0.15);  color: var(--gold);   border: 1px solid rgba(255,215,0,0.3); }
    .tag-nobilling{ background: rgba(92,122,170,0.15); color: var(--muted);  border: 1px solid rgba(92,122,170,0.3); }

    .referee-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ========== SEARCH / FILTER ========== */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      position: relative;
      min-width: 180px;
    }
    .search-wrap input { padding-left: 36px; }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }

    .filter-select {
      width: auto;
      min-width: 110px;
      flex-shrink: 0;
    }

    /* ========== MATCH LIST ========== */
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .match-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }

    .match-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .match-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .match-status {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .match-status.upcoming  { background: rgba(30,144,255,0.2);  color: var(--accent2); }
    .match-status.done      { background: rgba(0,230,118,0.15);  color: var(--green); }
    .match-status.cancelled { background: rgba(255,77,109,0.12); color: var(--red); }

    .match-assign {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
    }

    .assign-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-right: 2px;
    }

    .assign-chip {
      background: rgba(30,144,255,0.15);
      border: 1px solid rgba(30,144,255,0.25);
      color: var(--accent2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .assign-chip .role-badge {
      font-size: 10px;
      color: var(--muted);
    }

    .assign-empty {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    .match-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* ========== ATTENDANCE ========== */
    .att-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .att-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .att-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .att-date {
      font-size: 12px;
      color: var(--muted);
    }

    .att-list { display: flex; flex-direction: column; gap: 8px; }

    .att-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .att-row:last-child { border-bottom: none; }

    .att-name {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
    }

    .att-toggle-group {
      display: flex;
      gap: 4px;
    }

    .att-btn {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .att-btn.active-ok  { background: rgba(0,230,118,0.2);  color: var(--green); border-color: rgba(0,230,118,0.4); }
    .att-btn.active-ng  { background: rgba(255,77,109,0.15); color: var(--red);   border-color: rgba(255,77,109,0.4); }
    .att-btn.active-abs { background: rgba(255,171,64,0.15); color: var(--orange); border-color: rgba(255,171,64,0.4); }

    /* ========== MODAL ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 16px 32px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--white);
    }

    /* ========== TOAST ========== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }

    /* ========== EMPTY STATE ========== */
    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* ========== LOADING ========== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== MISC ========== */
    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .text-muted { color: var(--muted); font-size: 12px; }

    .flex-end { display: flex; justify-content: flex-end; gap: 8px; }

    .mb-4 { margin-bottom: 4px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-emblem" id="logoEmblem">BSC</div>
      <div class="logo-text">
        <div class="logo-name">バディサッカークラブ</div>
        <div class="logo-sub">⚽ REFEREE MANAGEMENT SYSTEM</div>
      </div>
    </div>
    <div class="header-right">
      <div class="badge-41">41TH</div>
      <div class="sync-status">
        <div class="dot" id="syncDot"></div>
        <span id="syncLabel">未接続</span>
      </div>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')"><span class="tab-icon">📊</span>ダッシュボード</button>
  <button class="tab-btn" onclick="switchTab('referees')"><span class="tab-icon">👤</span>審判一覧</button>
  <button class="tab-btn" onclick="switchTab('matches')"><span class="tab-icon">📋</span>試合管理</button>
  <button class="tab-btn" onclick="switchTab('attendance')"><span class="tab-icon">✅</span>出欠管理</button>
  <button class="tab-btn" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span>設定</button>
</div>

<!-- MAIN -->
<main>

  <!-- ========== DASHBOARD ========== -->
  <div id="tab-dashboard" class="section active">
    <div class="stats-grid">
      <div class="stat-card gold">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">登録審判数</div>
      </div>
      <div class="stat-card green-bar">
        <div class="stat-num" id="stat-active">—</div>
        <div class="stat-label">参加可能</div>
      </div>
      <div class="stat-card red-bar">
        <div class="stat-num" id="stat-billing">—</div>
        <div class="stat-label">更新料請求あり</div>
      </div>
      <div class="stat-card orange-bar">
        <div class="stat-num" id="stat-matches">—</div>
        <div class="stat-label">今月の試合数</div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">直近の試合</span>
      <button class="btn btn-ghost btn-sm" onclick="switchTab('matches')">すべて見る →</button>
    </div>
    <div id="dashboard-matches">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>

    <div class="section-header" style="margin-top:20px">
      <span class="section-title">更新料請求が必要な審判</span>
    </div>
    <div id="dashboard-billing">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- ========== REFEREE LIST ========== -->
  <div id="tab-referees" class="section">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="氏名・電話番号で検索" oninput="renderReferees()">
      </div>
      <select class="filter-select" id="filterLicense" onchange="renderReferees()">
        <option value="">全ライセンス</option>
        <option value="1級">1級</option>
        <option value="2級">2級</option>
        <option value="3級">3級</option>
        <option value="4級">4級</option>
        <option value="女子1級">女子1級</option>
        <option value="女子2級">女子2級</option>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ========== CONFIG ==========
const STORAGE_KEY = 'buddy41_referee_cfg';
let GAS_URL = localStorage.getItem(STORAGE_KEY + '_url') || '';

let referees  = [];
let matches   = [];
let attendances = [];
let editingRefId  = null;
let editingMatchId = null;

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gasUrl').value = GAS_URL;
  const savedLogo = localStorage.getItem(STORAGE_KEY + '_logo');
  if (savedLogo) applyLogoUrl(savedLogo);
  loadAll();
});

// ========== TAB ==========
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.includes(tabLabel(name))) b.classList.add('active');
  });
  if (name === 'attendance') buildAttRefereeList();
  if (name === 'matches') fillRefereeSelects();
}

function tabLabel(name) {
  return { dashboard: 'ダッシュボード', referees: '審判一覧', matches: '試合管理', attendance: '出欠管理', settings: '設定' }[name] || '';
}

// ========== API ==========
async function api(action, data = {}) {
  if (!GAS_URL) { showToast('設定タブでGAS URLを登録してください', 'error'); return null; }
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, ...data })
    });
    return await res.json();
  } catch (e) {
    showToast('通信エラー: ' + e.message, 'error');
    return null;
  }
}

async function loadAll() {
  setSyncStatus('loading');
  await Promise.all([loadReferees(), loadMatches(), loadAttendances()]);
  renderDashboard();
  renderReferees();
  renderMatches();
  renderAttendances();
  setSyncStatus('ok');
}

// ========== REFEREES ==========
async function loadReferees() {
  const r = await api('getReferees');
  if (r && r.data) referees = r.data;
}

function renderReferees() {
  const search   = (document.getElementById('searchInput').value || '').toLowerCase();
  const lic      = document.getElementById('filterLicense').value;
  const act      = document.getElementById('filterActive').value;

  let list = referees.filter(r => {
    if (search && !r.name.toLowerCase().includes(search) && !(r.phone || '').includes(search)) return false;
    if (lic && r.license !== lic) return false;
    if (act !== '' && String(r.active) !== act) return false;
    return true;
  });

  document.getElementById('refereeCount').textContent = `審判一覧 (${list.length}名)`;

  const el = document.getElementById('refereeList');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">該当する審判が見つかりません</div></div>`;
    return;
  }

  el.innerHTML = list.map(r => `
    <div class="referee-card" onclick="openRefereeModal('${r.id}')">
      <div class="referee-avatar">${(r.name || '?')[0]}</div>
      <div class="referee-info">
        <div class="referee-name">${esc(r.name)} <span style="font-size:12px;color:var(--muted);font-weight:400">${esc(r.kana||'')}</span></div>
        <div class="referee-meta">
          ${r.license ? `<span class="tag tag-license">🏅 ${esc(r.license)}</span>` : ''}
          <span class="tag ${r.active ? 'tag-active' : 'tag-inactive'}">${r.active ? '✅ 参加可' : '❌ 不参加'}</span>
          <span class="tag ${r.billing ? 'tag-billing' : 'tag-nobilling'}">${r.billing ? '💰 請求あり' : '請求なし'}</span>
          ${r.category ? `<span style="font-size:11px;color:var(--muted)">${esc(r.category)}</span>` : ''}
        </div>
      </div>
      <div class="referee-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openRefereeModal('${r.id}')">編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteReferee('${r.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

function openRefereeModal(id) {
  editingRefId = id || null;
  const modal = document.getElementById('refereeModal');
  const r = id ? referees.find(x => x.id === id) : null;
  document.getElementById('refereeModalTitle').textContent = r ? '審判を編集' : '審判を登録';
  document.getElementById('r-name').value     = r ? r.name    || '' : '';
  document.getElementById('r-kana').value     = r ? r.kana    || '' : '';
  document.getElementById('r-phone').value    = r ? r.phone   || '' : '';
  document.getElementById('r-email').value    = r ? r.email   || '' : '';
  document.getElementById('r-license').value  = r ? r.license || '' : '';
  document.getElementById('r-licenseNo').value= r ? r.licenseNo || '' : '';
  document.getElementById('r-expiry').value   = r ? r.expiry  || '' : '';
  document.getElementById('r-category').value = r ? r.category || '' : '';
  document.getElementById('r-active').checked   = r ? !!r.active   : true;
  document.getElementById('r-billing').checked  = r ? !!r.billing  : false;
  document.getElementById('r-note').value     = r ? r.note    || '' : '';
  modal.classList.add('open');
}

async function saveReferee() {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { showToast('氏名を入力してください', 'error'); return; }
  const data = {
    id:        editingRefId || newId(),
    name,
    kana:      document.getElementById('r-kana').value.trim(),
    phone:     document.getElementById('r-phone').value.trim(),
    email:     document.getElementById('r-email').value.trim(),
    license:   document.getElementById('r-license').value,
    licenseNo: document.getElementById('r-licenseNo').value.trim(),
    expiry:    document.getElementById('r-expiry').value,
    category:  document.getElementById('r-category').value.trim(),
    active:    document.getElementById('r-active').checked,
    billing:   document.getElementById('r-billing').checked,
    note:      document.getElementById('r-note').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  const r = await api(editingRefId ? 'updateReferee' : 'addReferee', { referee: data });
  if (r && r.ok) {
    showToast(editingRefId ? '更新しました' : '登録しました', 'success');
    closeModal('refereeModal');
    await loadReferees();
    renderReferees();
    renderDashboard();
  }
}

async function deleteReferee(id) {
  if (!confirm('この審判を削除しますか？')) return;
  const r = await api('deleteReferee', { id });
  if (r && r.ok) {
    showToast('削除しました');
    await loadReferees();
    renderReferees();
    renderDashboard();
  }
}

// ========== MATCHES ==========
async function loadMatches() {
  const r = await api('getMatches');
  if (r && r.data) matches = r.data;
}

function renderMatches() {
  const el = document.getElementById('matchList');
  const sorted = [...matches].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (!sorted.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">試合が登録されていません</div></div>`;
    return;
  }
  el.innerHTML = sorted.map(m => matchCardHTML(m)).join('');
}

function matchCardHTML(m) {
  const refs = [
    m.ref1 ? `<span class="assign-chip">${esc(refName(m.ref1))} <span class="role-badge">主審</span></span>` : '',
    m.ref2 ? `<span class="assign-chip">${esc(refName(m.ref2))} <span class="role-badge">副審1</span></span>` : '',
    m.ref3 ? `<span class="assign-chip">${esc(refName(m.ref3))} <span class="role-badge">副審2</span></span>` : '',
  ].filter(Boolean);
  const statusMap = { upcoming: '予定', done: '完了', cancelled: '中止' };
  return `
    <div class="match-card">
      <div class="match-header">
        <div>
          <div class="match-title">${esc(m.title)}</div>
          <div class="match-date">📅 ${m.date || '—'} ${m.time || ''} ${m.venue ? '｜📍' + esc(m.venue) : ''} ${m.category ? '｜' + esc(m.category) : ''}</div>
        </div>
        <span class="match-status ${m.status || 'upcoming'}">${statusMap[m.status] || '予定'}</span>
      </div>
      <div class="match-assign">
        <span class="assign-label">審判:</span>
        ${refs.length ? refs.join('') : '<span class="assign-empty">未アサイン</span>'}
      </div>
      <div class="match-footer">
        ${m.note ? `<span class="text-muted">${esc(m.note)}</span>` : '<span></span>'}
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openMatchModal('${m.id}')">編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">削除</button>
        </div>
      </div>
    </div>
  `;
}

function refName(id) {
  const r = referees.find(x => x.id === id);
  return r ? r.name : id;
}

function fillRefereeSelects() {
  const opts = '<option value="">未定</option>' + referees.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  ['m-ref1','m-ref2','m-ref3'].forEach(id => {
    document.getElementById(id).innerHTML = opts;
  });
}

function openMatchModal(id) {
  editingMatchId = id || null;
  fillRefereeSelects();
  const m = id ? matches.find(x => x.id === id) : null;
  document.getElementById('matchModalTitle').textContent = m ? '試合を編集' : '試合を追加';
  document.getElementById('m-title').value    = m ? m.title    || '' : '';
  document.getElementById('m-date').value     = m ? m.date     || '' : '';
  document.getElementById('m-time').value     = m ? m.time     || '' : '';
  document.getElementById('m-venue').value    = m ? m.venue    || '' : '';
  document.getElementById('m-category').value = m ? m.category || '' : '';
  document.getElementById('m-ref1').value     = m ? m.ref1     || '' : '';
  document.getElementById('m-ref2').value     = m ? m.ref2     || '' : '';
  document.getElementById('m-ref3').value     = m ? m.ref3     || '' : '';
  document.getElementById('m-status').value   = m ? m.status   || 'upcoming' : 'upcoming';
  document.getElementById('m-note').value     = m ? m.note     || '' : '';
  document.getElementById('matchModal').classList.add('open');
}

async function saveMatch() {
  const title = document.getElementById('m-title').value.trim();
  const date  = document.getElementById('m-date').value;
  if (!title || !date) { showToast('試合名と日付を入力してください', 'error'); return; }
  const data = {
    id:       editingMatchId || newId(),
    title, date,
    time:     document.getElementById('m-time').value,
    venue:    document.getElementById('m-venue').value.trim(),
    category: document.getElementById('m-category').value.trim(),
    ref1:     document.getElementById('m-ref1').value,
    ref2:     document.getElementById('m-ref2').value,
    ref3:     document.getElementById('m-ref3').value,
    status:   document.getElementById('m-status').value,
    note:     document.getElementById('m-note').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  const r = await api(editingMatchId ? 'updateMatch' : 'addMatch', { match: data });
  if (r && r.ok) {
    showToast(editingMatchId ? '更新しました' : '追加しました', 'success');
    closeModal('matchModal');
    await loadMatches();
    renderMatches();
    renderDashboard();
  }
}

async function deleteMatch(id) {
  if (!confirm('この試合を削除しますか？')) return;
  const r = await api('deleteMatch', { id });
  if (r && r.ok) {
    showToast('削除しました');
    await loadMatches();
    renderMatches();
    renderDashboard();
  }
}

// ========== ATTENDANCE ==========
async function loadAttendances() {
  const r = await api('getAttendances');
  if (r && r.data) attendances = r.data;
}

let attStatuses = {};

function openAttModal() {
  attStatuses = {};
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('att-date').value = today;
  const matchOpts = '<option value="">選択なし</option>' +
    matches.filter(m => m.status === 'upcoming' || !m.status)
           .map(m => `<option value="${m.id}">${esc(m.date)} ${esc(m.title)}</option>`).join('');
  document.getElementById('att-match').innerHTML = matchOpts;
  buildAttRefereeList();
  document.getElementById('attModal').classList.add('open');
}

function buildAttRefereeList() {
  const el = document.getElementById('att-referee-list');
  if (!referees.length) {
    el.innerHTML = '<div class="empty-text" style="color:var(--muted);font-size:13px">先に審判を登録してください</div>';
    return;
  }
  el.innerHTML = referees.filter(r => r.active).map(r => `
    <div class="att-row">
      <div class="att-name">${esc(r.name)}</div>
      <div class="att-toggle-group">
        <button class="att-btn" id="att-ok-${r.id}"  onclick="setAtt('${r.id}','ok')">○ 出席</button>
        <button class="att-btn" id="att-ng-${r.id}"  onclick="setAtt('${r.id}','ng')">× 欠席</button>
        <button class="att-btn" id="att-abs-${r.id}" onclick="setAtt('${r.id}','abs')">△ 未定</button>
      </div>
    </div>
  `).join('');
}

function setAtt(refId, status) {
  attStatuses[refId] = status;
  ['ok','ng','abs'].forEach(s => {
    const b = document.getElementById(`att-${s}-${refId}`);
    if (b) b.className = 'att-btn' + (s === status ? ` active-${s}` : '');
  });
}

async function saveAttendance() {
  const date    = document.getElementById('att-date').value;
  const matchId = document.getElementById('att-match').value;
  if (!date) { showToast('日付を入力してください', 'error'); return; }
  if (!Object.keys(attStatuses).length) { showToast('出欠を入力してください', 'error'); return; }
  const records = Object.entries(attStatuses).map(([refId, status]) => ({
    id: newId(), date, matchId, refId, status, createdAt: new Date().toISOString()
  }));
  const r = await api('addAttendances', { records });
  if (r && r.ok) {
    showToast('記録を保存しました', 'success');
    closeModal('attModal');
    await loadAttendances();
    renderAttendances();
  }
}

function renderAttendances() {
  const el = document.getElementById('attList');
  const grouped = {};
  attendances.forEach(a => {
    const key = a.date + (a.matchId ? '_' + a.matchId : '');
    if (!grouped[key]) grouped[key] = { date: a.date, matchId: a.matchId, records: [] };
    grouped[key].records.push(a);
  });
  const keys = Object.keys(grouped).sort().reverse();
  if (!keys.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">出欠記録がありません</div></div>`;
    return;
  }
  el.innerHTML = keys.map(key => {
    const g = grouped[key];
    const m = g.matchId ? matches.find(x => x.id === g.matchId) : null;
    const statusIcon = { ok: '🟢', ng: '🔴', abs: '🟡' };
    const statusLabel = { ok: '出席', ng: '欠席', abs: '未定' };
    return `
      <div class="att-card">
        <div class="att-header">
          <div class="att-title">${g.date}${m ? ' / ' + esc(m.title) : ''}</div>
          <div class="att-date">${g.records.length}名記録</div>
        </div>
        <div class="att-list">
          ${g.records.map(rec => {
            const ref = referees.find(r => r.id === rec.refId);
            return `<div class="att-row">
              <div class="att-name">${ref ? esc(ref.name) : rec.refId}</div>
              <span class="tag ${rec.status === 'ok' ? 'tag-active' : rec.status === 'ng' ? 'tag-inactive' : ''}" style="${rec.status==='abs'?'background:rgba(255,171,64,.15);color:var(--orange);border:1px solid rgba(255,171,64,.3)':''}">
                ${statusIcon[rec.status] || ''} ${statusLabel[rec.status] || rec.status}
              </span>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ========== DASHBOARD ==========
function renderDashboard() {
  document.getElementById('stat-total').textContent   = referees.length;
  document.getElementById('stat-active').textContent  = referees.filter(r => r.active).length;
  document.getElementById('stat-billing').textContent = referees.filter(r => r.billing).length;
  const thisMonth = new Date().toISOString().slice(0,7);
  document.getElementById('stat-matches').textContent = matches.filter(m => (m.date||'').startsWith(thisMonth)).length;

  // 直近の試合3件
  const today = new Date().toISOString().split('T')[0];
  const upcoming = matches.filter(m => m.date >= today && m.status !== 'cancelled')
                          .sort((a,b) => a.date.localeCompare(b.date)).slice(0, 3);
  const dEl = document.getElementById('dashboard-matches');
  dEl.innerHTML = upcoming.length
    ? upcoming.map(m => matchCardHTML(m)).join('')
    : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">直近の試合はありません</div></div>`;

  // 更新料請求あり
  const billing = referees.filter(r => r.billing);
  const bEl = document.getElementById('dashboard-billing');
  bEl.innerHTML = billing.length
    ? billing.map(r => `
        <div class="referee-card" style="cursor:default">
          <div class="referee-avatar">${(r.name||'?')[0]}</div>
          <div class="referee-info">
            <div class="referee-name">${esc(r.name)}</div>
            <div class="referee-meta">
              ${r.license ? `<span class="tag tag-license">🏅 ${esc(r.license)}</span>` : ''}
              ${r.expiry ? `<span class="text-muted">有効期限: ${r.expiry}</span>` : ''}
            </div>
          </div>
          <span class="tag tag-billing">💰 請求あり</span>
        </div>
      `).join('')
    : `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">請求が必要な審判はいません</div></div>`;
}

// ========== SETTINGS ==========
function saveSettings() {
  GAS_URL = document.getElementById('gasUrl').value.trim();
  localStorage.setItem(STORAGE_KEY + '_url', GAS_URL);
  showToast('設定を保存しました', 'success');
  loadAll();
}

function applyLogo() {
  const url = document.getElementById('logoUrl').value.trim();
  if (url) {
    localStorage.setItem(STORAGE_KEY + '_logo', url);
    applyLogoUrl(url);
    showToast('ロゴを適用しました', 'success');
  }
}

function applyLogoUrl(url) {
  const el = document.getElementById('logoEmblem');
  el.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent='BSC'">`;
}

// ========== UTILS ==========
function newId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 2800);
}

function setSyncStatus(state) {
  const dot   = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (state === 'ok') {
    dot.className = 'dot green';
    label.textContent = '同期済み';
  } else if (state === 'loading') {
    dot.className = 'dot';
    label.textContent = '同期中...';
  } else {
    dot.className = 'dot red';
    label.textContent = '未接続';
  }
}
</script>
